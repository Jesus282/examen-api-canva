<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Proyecto Canvas 2D - Figura de Payaso</title>
    <link rel="icon" href="./assets/img/favicon.png">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>

<body>

<!-- ===================== NAVBAR ===================== -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
        <span class="navbar-brand fw-semibold">
            Proyecto Canvas 2D
        </span>

        <div class="ms-auto text-white">
            Programador: Jesús | Ingeniería en Sistemas
        </div>
    </div>
</nav>


<!-- ===================== CONTENIDO PRINCIPAL ===================== -->
<main class="container my-5">
    <div class="row g-4">

        <!-- Canvas Dibujado -->
        <div class="col-lg-6">
            <div class="card shadow-lg border-0 h-100">
                <div class="card-header bg-primary text-white text-center">
                    Imagen Dibujada por Programación
                </div>
                <div class="card-body d-flex justify-content-center align-items-center">
                    <canvas 
                        id="lienzoPayaso" 
                        width="400" 
                        height="600"
                        class="border rounded">
                        Tu navegador no soporta Canvas.
                    </canvas>
                </div>
            </div>
        </div>

        <!-- Imagen Original -->
        <div class="col-lg-6">
            <div class="card shadow-lg border-0 h-100">
                <div class="card-header bg-success text-white text-center">
                    Imagen Original
                </div>
                <div class="card-body text-center">
                    <img 
                        src="./assets/img/image.png" 
                        class="img-fluid rounded shadow"
                        alt="Imagen original del payaso">
                </div>
            </div>
        </div>

    </div>
</main>


<!-- ===================== FOOTER ===================== -->
<footer class="bg-dark text-white text-center py-3 mt-4">
    © 2026 - Proyecto Canvas API 2D <br>
    Desarrollado por Jesús | Ingeniería en Sistemas
</footer>


<!-- ===================== SCRIPTS ===================== -->
<script src="./assets/js/main.js"></script>

</body>
</html>
